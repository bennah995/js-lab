<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALCULATOR</title>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" readonly value="0">

    <div class="grid">
      <button class="clear" data-type="clear">C</button>
      <button data-type="operator" data-val="/">/</button>
      <button data-type="operator" data-val="*">*</button>
      <button data-type="operator" data-val="-">-</button>

      <button data-type="number" data-val="7">7</button>
      <button data-type="number" data-val="8">8</button>
      <button data-type="number" data-val="9">9</button>
      <button data-type="operator" data-val="+">+</button>

      <button data-type="number" data-val="4">4</button>
      <button data-type="number" data-val="5">5</button>
      <button data-type="number" data-val="6">6</button>
      <button class="equal" data-type="equals">=</button>

      <button data-type="number" data-val="1">1</button>
      <button data-type="number" data-val="2">2</button>
      <button data-type="number" data-val="3">3</button>

      <button data-type="number" data-val="0" style="grid-column: span 3;">0</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
